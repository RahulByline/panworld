<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Educational Kit Promo Card</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef2fb;
      color: #1f2b55;
    }

    .promo-card {
      position: relative;
      width: min(1200px, 100%);
      min-height: 520px;
      overflow: hidden;
      border-radius: 28px;
      background: #f7f2e8;
      box-shadow: 0 22px 60px rgba(28, 46, 102, 0.14);
      border: 1px solid #e3e0d7;
    }

    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      text-align: center;
      padding: 84px 24px 72px;
    }

    .kicker {
      font-size: 22px;
      font-style: italic;
      color: #2a3f8f;
      margin-bottom: 12px;
      font-family: Georgia, "Times New Roman", serif;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 8vw, 108px);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: -0.04em;
      color: #23398e;
      font-weight: 800;
    }

    .subtitle {
      margin: 28px 0 16px;
      font-size: 28px;
      font-weight: 800;
      color: #263d92;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .offer {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      color: #263d92;
      text-transform: uppercase;
    }

    .desc {
      margin: 10px 0 0;
      font-size: 27px;
      font-weight: 700;
      color: #263d92;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .line {
      width: 120px;
      height: 4px;
      border-radius: 999px;
      background: #334ba0;
      margin: 28px auto 30px;
    }

    .cta {
      display: inline-block;
      background: #ea2c6f;
      color: #fff;
      text-decoration: none;
      padding: 18px 34px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 32px;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(234, 44, 111, 0.22);
    }

    .footer-note {
      margin-top: 26px;
      font-size: 15px;
      color: #53618e;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .shape {
      position: absolute;
      z-index: 1;
    }

    .blob-left-top {
      width: 260px;
      height: 180px;
      left: -26px;
      top: -10px;
      background: #324a97;
      border-radius: 0 0 120px 0;
    }

    .blob-left-mid {
      width: 170px;
      height: 170px;
      left: 22px;
      top: 212px;
      background: #b8c8e9;
      border-radius: 50%;
    }

    .blob-right-top {
      width: 220px;
      height: 290px;
      right: -28px;
      top: -4px;
      background: #3550ab;
      transform: rotate(8deg);
      border-radius: 0 0 0 120px;
    }

    .blob-right-mid {
      width: 120px;
      height: 210px;
      right: 126px;
      top: 14px;
      background: #b9c9ea;
      border-radius: 80px 0 0 80px;
      transform: rotate(8deg);
    }

    .blob-right-bottom {
      width: 190px;
      height: 110px;
      right: 22px;
      bottom: -8px;
      background: #2b3f8f;
      border-radius: 120px 0 0 0;
    }

    .leaf {
      position: absolute;
      width: 110px;
      height: 150px;
      z-index: 2;
    }

    .leaf::before,
    .leaf::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 120px 10px 120px 10px;
      background: #164e35;
    }

    .leaf::after {
      inset: 8px;
      background: #1e6b47;
      opacity: 0.35;
    }

    .leaf-left {
      left: 42px;
      bottom: 8px;
      transform: rotate(-26deg);
    }

    .leaf-left.two {
      left: 102px;
      bottom: 2px;
      transform: rotate(14deg);
    }

    .leaf-right {
      right: 58px;
      bottom: 6px;
      transform: rotate(22deg);
    }

    .leaf-right.two {
      right: 114px;
      bottom: 14px;
      transform: rotate(-18deg);
    }

    .hanger {
      position: absolute;
      z-index: 2;
      left: 86px;
      top: 26px;
      width: 90px;
      height: 70px;
    }

    .hanger::before {
      content: "";
      position: absolute;
      left: 34px;
      top: -8px;
      width: 18px;
      height: 28px;
      border: 4px solid #f1d5a0;
      border-bottom: none;
      border-radius: 18px 18px 0 0;
    }

    .hanger::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 90px;
      height: 40px;
      border: 5px solid #f1d5a0;
      border-top: none;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      border-radius: 0 0 30px 30px;
    }

    .shirt {
      position: absolute;
      z-index: 3;
      left: 20px;
      top: 64px;
      width: 200px;
      height: 180px;
      background: linear-gradient(180deg, #ff9bc4 0%, #f27cb0 100%);
      clip-path: polygon(17% 14%, 31% 0, 69% 0, 83% 14%, 100% 22%, 89% 42%, 83% 100%, 17% 100%, 11% 42%, 0 22%);
      box-shadow: 0 16px 30px rgba(245, 110, 164, 0.22);
    }

    .shirt::before {
      content: "";
      position: absolute;
      left: 62px;
      top: 14px;
      width: 76px;
      height: 28px;
      background: #f7f2e8;
      border-radius: 0 0 40px 40px;
    }

    .shirt-text {
      position: absolute;
      z-index: 4;
      left: 56px;
      top: 136px;
      color: rgba(255, 255, 255, 0.95);
      font-size: 34px;
      font-style: italic;
      transform: rotate(-10deg);
      font-family: Georgia, "Times New Roman", serif;
    }

    .bag {
      position: absolute;
      z-index: 3;
      left: 88px;
      bottom: 48px;
      width: 150px;
      height: 112px;
      background: linear-gradient(180deg, #2f63c7 0%, #214f9f 100%);
      border-radius: 18px 18px 16px 16px;
      box-shadow: 0 18px 28px rgba(28, 68, 145, 0.22);
    }

    .bag::before {
      content: "";
      position: absolute;
      left: 28px;
      top: -36px;
      width: 90px;
      height: 54px;
      border: 6px solid #2f63c7;
      border-bottom: none;
      border-radius: 48px 48px 0 0;
    }

    .bag::after {
      content: "";
      position: absolute;
      right: 18px;
      top: 26px;
      width: 12px;
      height: 28px;
      border-radius: 4px;
      background: #e8eef9;
    }

    .bag-strip {
      position: absolute;
      left: 54px;
      bottom: 18px;
      width: 44px;
      height: 10px;
      background: #cedaf1;
      border-radius: 999px;
      z-index: 4;
    }

    .panel {
      position: absolute;
      z-index: 2;
      right: 42px;
      top: 30px;
      width: 156px;
      height: 188px;
      border-radius: 10px;
      background: linear-gradient(180deg, #405eb4 0%, #27449a 100%);
      transform: rotate(9deg);
      box-shadow: 0 18px 28px rgba(39, 68, 154, 0.18);
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }

    .panel::before {
      width: 120px;
      height: 4px;
      left: 16px;
      top: 34px;
    }

    .panel::after {
      width: 96px;
      height: 4px;
      left: 16px;
      top: 54px;
    }

    .cap {
      position: absolute;
      z-index: 3;
      right: 74px;
      top: 42px;
      width: 114px;
      height: 74px;
      background: linear-gradient(180deg, #ffd98a 0%, #f0c662 100%);
      border-radius: 60px 60px 46px 46px;
      transform: rotate(14deg);
      box-shadow: 0 12px 22px rgba(233, 186, 80, 0.22);
    }

    .cap::before {
      content: "";
      position: absolute;
      right: -24px;
      top: 30px;
      width: 62px;
      height: 22px;
      background: #f0c662;
      border-radius: 0 24px 24px 0;
      transform: skewX(-24deg);
    }

    .shoe {
      position: absolute;
      z-index: 3;
      right: 92px;
      bottom: 38px;
      width: 114px;
      height: 74px;
      background: linear-gradient(180deg, #ff397f 0%, #e31f67 100%);
      border-radius: 60px 60px 16px 36px;
      transform: rotate(-22deg);
      box-shadow: 0 16px 26px rgba(226, 31, 103, 0.22);
    }

    .shoe::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 14px;
      width: 58px;
      height: 34px;
      background: #f4e6c2;
      border-radius: 32px 32px 12px 18px;
    }

    .shoe.two {
      right: 26px;
      bottom: 44px;
      transform: rotate(-6deg);
    }

    @media (max-width: 900px) {
      .promo-card {
        min-height: 700px;
      }

      .content {
        padding-top: 280px;
        max-width: 520px;
      }

      .shirt {
        left: 18px;
        top: 44px;
        transform: scale(0.88);
        transform-origin: top left;
      }

      .bag {
        left: 86px;
        bottom: auto;
        top: 200px;
        transform: scale(0.88);
      }

      .panel {
        right: 22px;
        top: 24px;
        transform: rotate(9deg) scale(0.88);
      }

      .cap {
        right: 44px;
        top: 36px;
        transform: rotate(14deg) scale(0.88);
      }

      .shoe,
      .shoe.two {
        bottom: 16px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .promo-card {
        min-height: 760px;
        border-radius: 22px;
      }

      .content {
        padding: 290px 18px 52px;
      }

      .kicker {
        font-size: 18px;
      }

      .offer,
      .desc {
        font-size: 20px;
      }

      .cta {
        font-size: 24px;
        padding: 15px 28px;
      }

      .shirt {
        transform: scale(0.72);
        left: 0;
      }

      .bag {
        transform: scale(0.72);
        left: 60px;
        top: 180px;
      }

      .panel {
        transform: rotate(9deg) scale(0.72);
        right: 0;
      }

      .cap {
        transform: rotate(14deg) scale(0.72);
        right: 18px;
      }

      .shoe {
        transform: rotate(-22deg) scale(0.72);
        right: 66px;
      }

      .shoe.two {
        transform: rotate(-6deg) scale(0.72);
        right: 4px;
      }

      .leaf-right,
      .leaf-right.two {
        display: none;
      }
    }
  </style>
</head>
<body>
  <section class="promo-card">
    <div class="shape blob-left-top"></div>
    <div class="shape blob-left-mid"></div>
    <div class="shape blob-right-top"></div>
    <div class="shape blob-right-mid"></div>
    <div class="shape blob-right-bottom"></div>

    <div class="hanger"></div>
    <div class="shirt"></div>
    <div class="shirt-text">learn</div>
    <div class="bag"></div>
    <div class="bag-strip"></div>

    <div class="panel"></div>
    <div class="cap"></div>
    <div class="shoe"></div>
    <div class="shoe two"></div>

    <div class="leaf leaf-left"></div>
    <div class="leaf leaf-left two"></div>
    <div class="leaf leaf-right"></div>
    <div class="leaf leaf-right two"></div>

    <div class="content">
      <div class="kicker">Premium</div>
      <h1>Educational<br>kits</h1>
      <p class="offer">Up to 50% off</p>
      <p class="desc">School-ready learning materials</p>
      <div class="line"></div>
      <a href="#" class="cta">View now</a>
      <div class="footer-note">www.educationkitschool.com/catalog</div>
    </div>
  </section>
</body>
</html>
